<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMA_TNBC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
    <script src="script2.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">
            <span class="title-text">Network Meta-analysis for Triple Negative Breast Cancer</span>
        </h1>
        <div class="background-section">
            <div class="background-header">
                <span class="background-text">Background</span>
            </div>
            <div class="tab-container">
                <div class="tab active" onclick="showTab('nma')" id="tab-nma">
                    Network Meta-analysis <span class="arrow">▼</span>
                </div>
                <div class="tab" onclick="showTab('tnbc')" id="tab-tnbc">
                    Triple Negative Breast Cancer <span class="arrow">▼</span>
                </div>
                <div class="tab" onclick="showTab('aim')" id="tab-aim">
                    Aim of the study <span class="arrow">▼</span>
                </div>
            </div>
            <div class="content-area">
                <div id="nmaContent" class="tab-content active">
                    <div class="loading">Loading content...</div>
                </div>
                <div id="tnbcContent" class="tab-content">
                    <div class="loading">Loading content...</div>
                </div>
                <div id="aimContent" class="tab-content">
                    <div class="loading">Loading content...</div>
                </div>
            </div>
        </div>

        <div class="highlights-section">
            <div class="background-header">
                <span class="background-text">Highlights</span>
            </div>
            <div class="content-area highlights-area">
                <div id="highlightsContent" class="static-content">
                    <div class="loading">Loading content...</div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
